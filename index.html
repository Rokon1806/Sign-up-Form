<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sign-Up Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div>
            <div class="box_1">
                <p>
                    This is not a real service! You know you need something like this in your life to help you realize your deepest dreams.<br>
                    Sign up <em>now</em> to get started.
                </p>
                <p>You <em>know you</em> want to.</p>
            </div>

            <div class="box_2">
                <form>
                    <legend>Let's do this!</legend>

                    <label for="first_name" id="label_1">FIRST NAME</label>
                    <label for="last_name" id="label_02">LAST NAME</label>
                    <br>
                    <input type="text" name="first_name" id="first_name" required>
                    <input type="text" name="last_name" class="label_2" id="last" required>
                    <br><br>

                    <label for="email" id="label_03">EMAIL</label>
                    <label for="phone">PHONE NUMBER</label>
                    <br>
                    <input type="email" name="email" id="email" required>
                    <input type="number" name="phone" id="phone" class="label_3" required>
                    <br><br>

                    <label for="password" id="label_04">PASSWORD</label>
                    <label for="confirm">CONFIRM PASSWORD</label>
                    <br>
                    <input type="password" name="password" id="password" class="invalid" required>
                    <input type="password" name="confirm" id="confirm" class="label_4 invalid" required>
                    <br><br>

                    <button type="submit" id="button">Create Account</button>
                </form>
            </div>

            <div class="box_3">
                <p id="log">Already have an account? <span>Log in</span></p>
            </div>
        </div>

        <div>
            <img src="https://assets.esecurityplanet.com/uploads/2024/10/esp_20241008-chinese-hackers-breach-wiretapping-data.png">
        </div>
        <div id="logo">
            <h1>Hacker's Bar</h1>
        </div>
        <div id="credit"> 
            <p>Photo by @ascreet</p>
        </div>
    </div>
</body>
</html>
